<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>pluie → hihat — synthé physique + pixel art</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- la scène pixel art occupe TOUT l'écran ; l'UI est un HUD posé dessus -->
  <canvas id="stage"></canvas>
  <div class="scanlines" aria-hidden="true"></div>

  <div class="hud">
    <header class="topbar">
      <div class="chip brand">
        <h1>PLUIE <em>►</em> HIHAT</h1>
        <small>SYNTHÉ PHYSIQUE · PIXEL ART</small>
      </div>
      <div class="chip out">
        <span class="cap">OUT</span>
        <canvas id="meter" width="84" height="10"></canvas>
        <input id="master" class="vol" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="volume master" />
        <button id="info-btn" class="iconbtn" title="infos paramètres" aria-label="infos">?</button>
      </div>
    </header>

    <footer class="dock">
      <div class="dock-main">
        <section class="morph-zone">
          <div class="ends"><span>NATURE</span><span>BEAT</span></div>
          <div id="morph-slot"></div>
        </section>
        <section class="knobs-zone">
          <div class="modrow" id="modules"></div>
          <div id="knobs"></div>
        </section>
      </div>
      <div class="dock-bottom">
        <button id="play" class="btn play"><span class="lbl">► PLAY</span></button>
        <button id="sweep" class="btn"><span class="lbl">⇄ SWEEP 8s</span></button>
        <div class="presetbar" id="presets"></div>
        <div class="tempo">
          <span class="cap">HI-HAT</span>
          <label class="field">BPM<input id="bpm" type="number" value="120" min="40" max="220" step="1" /></label>
          <select id="subdiv" aria-label="subdivision">
            <option value="1">1/4</option>
            <option value="2">1/8</option>
            <option value="3">1/8T</option>
            <option value="4" selected>1/16</option>
          </select>
        </div>
        <label class="field seed">SEED<input id="seed" type="number" value="1" min="0" step="1" /></label>
      </div>
    </footer>
  </div>

  <div id="info" class="info-overlay" hidden>
    <div class="info-card">
      <div class="info-head">
        <h2>PARAMÈTRES &amp; PHYSIQUE</h2>
        <button id="info-close" aria-label="fermer">×</button>
      </div>
      <div id="info-list" class="info-list"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
