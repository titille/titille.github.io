<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formes Concentriques</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="controls">
      <header>
        <h1>Formes<br>Concentriques</h1>
        <p class="subtitle">Générateur de géométrie aléatoire</p>
      </header>

      <section>
        <h2>Forme</h2>
        <div class="radio-group">
          <label class="radio-btn">
            <input type="radio" name="shape" value="circle" checked>
            <span>Cercles</span>
          </label>
          <label class="radio-btn">
            <input type="radio" name="shape" value="square">
            <span>Carrés</span>
          </label>
          <label class="radio-btn">
            <input type="radio" name="shape" value="mix">
            <span>Mix</span>
          </label>
        </div>
      </section>

      <section>
        <h2>Paramètres</h2>
        <div class="param-row">
          <div class="param-label">
            <span>Centres</span>
            <span class="val" id="centers-val">3</span>
          </div>
          <input type="range" id="num-centers" min="1" max="12" value="3" class="slider">
        </div>
        <div class="param-row">
          <div class="param-label">
            <span>Anneaux</span>
            <span class="val" id="shapes-val">15</span>
          </div>
          <input type="range" id="num-shapes" min="5" max="30" value="15" class="slider">
        </div>
        <div class="param-row">
          <div class="param-label">
            <span>Facteur <em>b</em></span>
            <span class="val" id="b-val">1.50</span>
          </div>
          <input type="range" id="b-param" min="0.5" max="3.0" step="0.05" value="1.5" class="slider">
        </div>
        <div class="param-row">
          <div class="param-label">
            <span>Marge</span>
            <span class="val" id="margin-val">100</span>
          </div>
          <input type="range" id="margin" min="20" max="200" value="100" class="slider">
        </div>
      </section>

      <section>
        <h2>Couleurs</h2>
        <div class="color-row">
          <div class="color-picker">
            <label for="start-color">Début</label>
            <input type="color" id="start-color" value="#d81b60">
          </div>
          <div class="color-picker">
            <label for="end-color">Fin</label>
            <input type="color" id="end-color" value="#1a00e8">
          </div>
        </div>
      </section>

      <section>
        <h2>Explorations</h2>
        <div class="toggle-list">
          <label class="toggle">
            <input type="checkbox" id="rotation">
            <span>Rotation</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="opacity">
            <span>Transparence</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="multi-color">
            <span>Multi-couleurs</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="gradient-bg">
            <span>Fond dégradé</span>
          </label>
        </div>
      </section>

      <section class="seed-section">
        <h2>Graine</h2>
        <code id="seed-val">—</code>
      </section>

      <div class="actions">
        <button id="random-btn" class="btn-secondary">Aléatoire</button>
        <button id="generate" class="btn-primary">Générer</button>
        <button id="export" class="btn-ghost">Exporter PNG</button>
      </div>
    </aside>

    <main>
      <canvas id="canvas" width="800" height="800"></canvas>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
